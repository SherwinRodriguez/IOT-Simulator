spring.application.name=SmartAgricultureSimulator

# PostgreSQL Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://db:5432/simulator_db}
spring.datasource.username=${DB_USER:simulator}
spring.datasource.password=${DB_PASSWORD:simulatorpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Web Configuration
server.port=${PORT:8080}
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# MQTT Broker (Default to Zoho if not provided)
mqtt.broker=${MQTT_BROKER:tcp://60863cfqlp.zohoiothub.in:1883}

# CORS Configuration (Production Frontend URL)
cors.allowed.origins=${CORS_ORIGIN:http://localhost}

# Actuator Health Checks (Expose /actuator/health)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
