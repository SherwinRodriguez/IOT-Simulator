version: '3.9'

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: zohoiot-db
    environment:
      POSTGRES_USER: ${DB_USER:-zohoiot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zohoiotpassword}
      POSTGRES_DB: ${DB_NAME:-zohoiot_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-zohoiot} -d ${DB_NAME:-zohoiot_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot Backend ────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zohoiot-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:postgresql://db:5432/${DB_NAME:-zohoiot_db}
      - DB_USER=${DB_USER:-zohoiot}
      - DB_PASSWORD=${DB_PASSWORD:-zohoiotpassword}
      - ZOHO_CLIENT_ID=${ZOHO_CLIENT_ID}
      - ZOHO_CLIENT_SECRET=${ZOHO_CLIENT_SECRET}
      - ZOHO_REDIRECT_URI=${ZOHO_REDIRECT_URI:-http://localhost/oauth/callback}
      - ZOHO_DEFAULT_REGION=${ZOHO_DEFAULT_REGION:-in}
      - ZOHO_IOT_APPLICATIONS=${ZOHO_IOT_APPLICATIONS:-}
      - ENCRYPTION_SECRET=${ENCRYPTION_SECRET}
      - MQTT_BROKER=${MQTT_BROKER:-tcp://60863cfqlp.zohoiothub.in:1883}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── React Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: zohoiot-frontend
    depends_on:
      - backend

  # ─── Nginx Reverse Proxy ────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: zohoiot-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro        # Mount SSL certs here
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
